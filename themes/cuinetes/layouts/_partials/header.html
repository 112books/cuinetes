<div class="site-header-inner">
  <a href="/" class="site-logo" aria-label="{{ site.Title }}">
    <img src="/images/logotip/Cuinetes-Logotip.png" alt="{{ site.Title }}" width="140" height="auto">
  </a>
  <nav class="site-nav" aria-label="Navegació principal">
    <button class="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Obrir menú">
      <span></span><span></span><span></span>
    </button>
    <ul id="nav-menu" class="nav-menu">
      {{ range site.Menus.main }}
      <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </nav>
</div>
