<!DOCTYPE html>
<html lang="ca">
<head>
  {{ partial "head.html" . }}
</head>
<body class="page--{{ .Kind }}{{ if .IsHome }} page--home{{ end }}{{ with .Type }} type--{{ . }}{{ end }}">
  <header class="site-header">
    {{ partial "header.html" . }}
  </header>
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    {{ partial "footer.html" . }}
  </footer>
</body>
</html>
