baseURL = "https://cuinetes.linuxbcn.com/"
title   = "Cuinetes"
theme   = "cuinetes"
defaultContentLanguage = "ca"
enableRobotsTXT = true
disableHugoGeneratorInject = true
summaryLength = 60
buildFuture   = true

[sitemap]
  filename = "sitemap.xml"

[pagination]
  pagerSize = 12

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[params]
  author          = "Joan Martínez i Serres"
  description     = "Receptes casolanes. Senzilles, bones i sense complicar-se la vida."
  goatcounterSite = "cuinetes"
  defaultOgImage  = "/images/logotip/Cuinetes-Logotip.png"

[taxonomies]
  categoria = "categories"
  tag       = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style   = "friendly"
    lineNos = false

[minify]
  disableCSS  = false
  disableHTML = false
  disableJS   = false

[[menus.main]]
  name   = "Receptes"
  url    = "/receptes/"
  weight = 1

[[menus.main]]
  name   = "Categories"
  url    = "/categories/"
  weight = 2

[[menus.main]]
  name   = "Ingredients"
  url    = "/tags/"
  weight = 3
