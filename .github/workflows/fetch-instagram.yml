name: Fetch Instagram Feed

on:
  schedule:
    - cron: '0 7 * * *'   # cada dia a les 7am UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install instaloader
        run: pip install instaloader --quiet

      - name: Fetch Instagram posts
        id: fetch
        env:
          IG_USERNAME: "cuinetes_linuxbcn"
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_MAX_POSTS: "9"
        run: |
          python3 scripts/fetch-instagram.py || {
            echo "::warning::No s'ha pogut obtenir el feed d'Instagram. Es conserva l'últim JSON."
            echo "fetch_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          echo "fetch_ok=true" >> "$GITHUB_OUTPUT"

      - name: Commit feed
        if: steps.fetch.outputs.fetch_ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/instagram.json static/images/instagram/
          git diff --staged --quiet || git commit -m "chore: update instagram feed [skip ci]"
          git pull --rebase
          git push
